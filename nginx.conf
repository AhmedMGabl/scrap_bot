server {
    listen 80;
    root /usr/share/nginx/html;
    index control_panel.html;

    # IMPORTANT: /api/ routes to the scrap_bot backend (port 5000 / binding 15012)
    location /api/ {
        proxy_pass http://172.17.0.1:15012;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        # Required for SSE (Server-Sent Events) streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    location ~* \.png$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        try_files $uri $uri/ /control_panel.html;
    }
}
